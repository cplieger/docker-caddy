services:
  caddy:
    image: ghcr.io/cplieger/docker-caddy:latest
    container_name: caddy
    restart: unless-stopped

    environment:
      # Provide these via a gitignored .env file (compose reads it automatically) or a
      # secrets manager — never commit live tokens into this file.
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:?set in .env}"  # used by the DNS-01 plugin
      CROWDSEC_BOUNCER_KEY: "${CROWDSEC_BOUNCER_KEY:?set in .env}"  # used by the CrowdSec bouncer

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    # Caddy binds privileged ports 80/443; NET_BIND_SERVICE grants that
    # without running the container as root from the host's perspective.
    cap_add:
      - NET_BIND_SERVICE

    # The image ships a liveness healthcheck (probes Caddy's admin API; works
    # with any Caddyfile). Use this end-to-end override when you want to verify
    # the proxy is actually serving, OR if your Caddyfile sets `admin off` /
    # rebinds the admin endpoint (which breaks the default probe). It answers
    # /health on :80 via Caddyfile.example:
    # healthcheck:
    #   test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]

    volumes:
      # Mount your Caddyfile here. Start from the repo's Caddyfile.example:
      #   cp Caddyfile.example Caddyfile
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist issued certs + ACME state (bind mount). Create ./data first:
      #   mkdir -p data
      - ./data:/data
