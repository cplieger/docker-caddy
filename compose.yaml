# Example compose for docker-caddy. See the README for all configuration options and hardening.
services:
  caddy:
    image: ghcr.io/cplieger/docker-caddy:latest
    container_name: caddy
    restart: unless-stopped

    environment:
      TZ: "Europe/Paris"
      # Set these in a gitignored .env file; never commit live tokens.
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:?set in .env}"  # used by the DNS-01 plugin
      CROWDSEC_BOUNCER_KEY: "${CROWDSEC_BOUNCER_KEY:?set in .env}"  # used by the CrowdSec bouncer

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3

    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile:ro"  # start from the repo's Caddyfile.example
      - "./data:/data"  # persist issued certs + ACME state
